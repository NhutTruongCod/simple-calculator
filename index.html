<!DOCTYPE html>
<html>

<head>
  <style>
    body{
      background-color: black;
      font-family: Arial, Helvetica, sans-serif;
      background-image: url(background-image.png);
      background-position: center;
      background-size: cover;
    }

    p {
      margin: 0;
    }

    .intro {
      color: rgb(172, 171, 171);
      margin-top: 2px;
      margin-bottom: 6px;
      font-size: 18px;
      
    }

    .page {
        min-height: 100vh;
      display: flex;
      justify-content: flex-end;
      align-items: center;
     padding-right: 22%;
      box-sizing: border-box;
    }

    .calculator-container {
      display: inline-block;
      border: 5px solid white;
      border-radius: 20px;
      padding: 35px 15px;
      background-color: rgb(30, 29, 29);
    }
  
    .number {
      background-color: rgb(85, 85, 85);
      color: white;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      font-size: 40px;
      margin-right: 5px;
      margin-top: 10px;
      cursor: pointer;
      transition: opacity 0.1s;
    }

    .number:hover {
      opacity: 0.6;
    }

    .number:active {
      opacity: 0.3;
    }

    .clear-button,
    .del-button {
      background-color: gray;
      color: white;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      margin-top: 10px;
      margin-right: 5px;
      transition: opacity 0.1s;
    }

    .clear-button:hover {
      opacity: 0.6;
    }

    .clear-button:active {
      opacity: 0.3;
    }

    .operator {
      background-color: rgb(239, 166, 40);
      color: white;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      font-size: 40px;
    }


    .screen {
      background-color: rgb(26, 21, 21);
      height: 90px;
      color: white;
      font-size: 50px;
      width: 340px;
      border: 2px solid rgb(19, 14, 14);
      box-shadow: inset 0 0 10px rgba(101, 100, 100, 0.2);
    }

    @media (max-width: 420px) {
    body {
      margin: 0;
      background-position: center;
      background-attachment: fixed;
    }

    .page {
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .calculator-container {
      width: 100%;
      max-width: 330px;
      padding: 20px 10px;
      box-sizing: border-box;
    }

    .intro {
      font-size: 14px;
      text-align: center;
    }

    .screen {
      width: 100%;
      height: 70px;
      box-sizing: border-box;
      font-size: 36px;
      text-align: right;
      padding: 8px;
    }

    .number,
    .operator,
    .clear-button,
    .del-button {
      width: 60px;
      height: 60px;
      margin-right: 3px;
    }

    .number,
    .operator {
      font-size: 28px;
    }

    .clear-button,
    .del-button {
      font-size: 15px;
    }

    .calculator-container p {
      display: flex;
      justify-content: center;
      gap: 5px;
    }
  }
  </style>
</head>

<body>
  <div class="page">
    <div class="calculator-container">
      <p class="intro">MÁY TÍNH CỦA NHỰT - CASIO 580FX</p>

      <input class="screen" type="text" readonly>
    
      <p>
        <button class="number" onclick="clickButton('1');
              ">1</button>
    
        <button class="number" onclick="clickButton('2');
              ">2</button>
    
        <button class="number" onclick="clickButton('3');
              ">3</button>
    
        <button class="operator" onclick="clickButton(' + ');
              ">+</button>
    
      </p>
    
      <p>
        <button class="number" onclick="clickButton('4')">4</button>
    
        <button class="number" onclick="clickButton('5');">5</button>
    
        <button class="number" onclick="clickButton('6');">6</button>
    
        <button class="operator" onclick="clickButton(' - ');">-</button>
      </p>
    
      <p>
        <button class="number" onclick="clickButton('7');
              ">7</button>
    
        <button class="number" onclick="clickButton('8');
              ">8</button>
    
        <button class="number" onclick="clickButton('9');
              ">9</button>
    
        <button class="operator" onclick="clickButton(' * ');
              ">*</button>
      </p>
    
      <p>
        <button class="number" onclick="clickButton('0');
              ">0</button>
    
        <button class="number" onclick="clickButton('.');
              ">.</button>
    
        <button class="number" onclick="resultButton();
              ">=</button>
    
        <button class="operator" onclick="clickButton(' / ');
              ">/</button>
      </p>
    
      <p>
        <button class="clear-button" onclick="clearr();">Clear</button>

        <button class="del-button" onclick="delButton()">DEL</button>
      </p>
    </div>
  </div>
  
  
    <script>
        let calculation = '';

        function clickButton(key) {
            calculation += `${key}`;

            document.querySelector('.screen').value = calculation;
            console.log(calculation);
        }

        function resultButton() {
          document.querySelector('.screen').value = eval(calculation);
          console.log(eval(calculation))
        }

        function clearr() {
            calculation = '';
            document.querySelector('.screen').value = calculation;
            console.log('Cleared');
        }

        function delButton(){
          calculation = calculation.slice(0, -1);
          document.querySelector('.screen').value = calculation;
        }
    </script>
</body>

</html>
